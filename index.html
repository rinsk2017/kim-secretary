<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김비서 소개</title>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fc;
            --bg-glass: rgba(255, 255, 255, 0.7);
            --border-glass: rgba(255, 255, 255, 0.2);
            --text-primary: #1a1a2e;
            --text-secondary: #555;
            --accent: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.07);
            --shadow-md: 0 10px 25px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.15);
        }

        [data-theme="dark"] {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a3e;
            --bg-glass: rgba(255, 255, 255, 0.05);
            --border-glass: rgba(255, 255, 255, 0.1);
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --accent: linear-gradient(135deg, #7c8ff0 0%, #9d5bd2 100%);
            --shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 10px 25px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--accent);
            opacity: 0.08;
            z-index: -2;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.1) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(50px, 50px); }
        }

        .header {
            position: fixed;
            top: 0;
            right: 0;
            padding: 20px 30px;
            z-index: 1000;
        }

        .theme-toggle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--bg-glass);
            border: 2px solid var(--border-glass);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow-md);
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            background: var(--bg-glass);
        }

        .container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            perspective: 1000px;
        }

        .content {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 30px;
            padding: 70px 60px;
            max-width: 750px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 56px;
            background: var(--accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 22px;
            color: var(--text-secondary);
            margin-bottom: 50px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .features {
            text-align: left;
            margin: 50px 0;
        }

        .feature-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-glass);
            border-radius: 15px;
            border: 1px solid var(--border-glass);
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .feature-item:hover {
            transform: translateX(5px);
            border-color: rgba(102, 126, 234, 0.3);
        }

        .feature-icon {
            width: 60px;
            height: 60px;
            background: var(--accent);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
            font-size: 28px;
            flex-shrink: 0;
            box-shadow: var(--shadow-md);
        }

        .feature-text strong {
            display: block;
            margin-bottom: 5px;
            font-size: 16px;
            color: var(--text-primary);
        }

        .feature-text span {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .btn-dashboard {
            display: inline-block;
            margin-top: 40px;
            padding: 16px 50px;
            background: var(--accent);
            color: white;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }

        .btn-dashboard::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            transition: left 0.3s;
        }

        .btn-dashboard:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        .btn-dashboard:hover::before {
            left: 100%;
        }

        @media (max-width: 768px) {
            .content {
                padding: 50px 30px;
            }

            h1 {
                font-size: 40px;
            }

            .subtitle {
                font-size: 18px;
            }

            .feature-item {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="theme-toggle" id="themeToggle" title="테마 변경">🌙</button>
    </div>

    <div class="container">
        <div class="content">
            <h1>김비서를 소개합니다</h1>
            <p class="subtitle">당신의 업무 효율화 파트너</p>

            <div class="features">
                <div class="feature-item">
                    <div class="feature-icon">📋</div>
                    <div class="feature-text">
                        <strong>할 일 관리</strong>
                        <span>우선순위별로 업무를 정리하고 진행상황을 추적합니다</span>
                    </div>
                </div>

                <div class="feature-item">
                    <div class="feature-icon">📅</div>
                    <div class="feature-text">
                        <strong>일정 관리</strong>
                        <span>주간 일정을 한눈에 보고 효율적으로 계획합니다</span>
                    </div>
                </div>

                <div class="feature-item">
                    <div class="feature-icon">📊</div>
                    <div class="feature-text">
                        <strong>프로젝트 추적</strong>
                        <span>프로젝트 진행률과 매출을 실시간으로 모니터링합니다</span>
                    </div>
                </div>
            </div>

            <a href="dashboard.html" class="btn-dashboard">내 대시보드 보기</a>
        </div>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;
        const THEME_KEY = 'kim-secretary-theme';

        function initTheme() {
            const savedTheme = localStorage.getItem(THEME_KEY) || 'light';
            htmlElement.setAttribute('data-theme', savedTheme);
            updateToggleIcon(savedTheme);
        }

        function updateToggleIcon(theme) {
            themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        function toggleTheme() {
            const currentTheme = htmlElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem(THEME_KEY, newTheme);
            updateToggleIcon(newTheme);
        }

        themeToggle.addEventListener('click', toggleTheme);
        initTheme();
    </script>
</body>
</html>
