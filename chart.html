<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매출 데이터 분석 차트</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #1e3a5f;
            margin-bottom: 40px;
            font-size: 28px;
            font-weight: 600;
        }

        .chart-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .chart-box {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .chart-box:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .chart-box h2 {
            color: #1e3a5f;
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: 600;
            border-bottom: 3px solid #2ecc71;
            padding-bottom: 10px;
        }

        canvas {
            width: 100%;
            height: auto;
            display: block;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 40px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        .stat-card h3 {
            color: #2c3e50;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            color: #7f8c8d;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
            color: #1e3a5f;
        }

        .stat-card.blue {
            border-top: 4px solid #3498db;
        }

        .stat-card.green {
            border-top: 4px solid #2ecc71;
        }

        .stat-card.teal {
            border-top: 4px solid #1abc9c;
        }

        @media (max-width: 768px) {
            .chart-wrapper {
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 22px;
            }
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #ecf0f1;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #555;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 매출 데이터 분석</h1>

        <div class="chart-wrapper">
            <div class="chart-box">
                <h2>월별 매출 추이</h2>
                <canvas id="lineChart" width="500" height="300"></canvas>
            </div>

            <div class="chart-box">
                <h2>제품별 매출 비교</h2>
                <canvas id="barChart" width="500" height="300"></canvas>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card blue">
                <h3>총 매출액</h3>
                <div class="value" id="totalSales">0</div>
            </div>
            <div class="stat-card green">
                <h3>평균 월별 매출</h3>
                <div class="value" id="avgSales">0</div>
            </div>
            <div class="stat-card teal">
                <h3>최고 판매 제품</h3>
                <div class="value" id="topProduct">-</div>
            </div>
        </div>
    </div>

    <script>
        // CSV 데이터 파싱
        const csvData = `날짜,제품,카테고리,수량,단가,매출액,지역
2026-01-05,무선 이어폰,전자기기,45,89000,4005000,서울
2026-01-05,보조배터리,전자기기,32,35000,1120000,서울
2026-01-05,텀블러,생활용품,78,25000,1950000,부산
2026-01-08,무선 이어폰,전자기기,52,89000,4628000,서울
2026-01-08,블루투스 스피커,전자기기,18,120000,2160000,대구
2026-01-08,텀블러,생활용품,65,25000,1625000,서울
2026-01-12,보조배터리,전자기기,41,35000,1435000,부산
2026-01-12,무선 충전기,전자기기,29,45000,1305000,서울
2026-01-12,에코백,생활용품,93,15000,1395000,대구
2026-01-15,무선 이어폰,전자기기,38,89000,3382000,부산
2026-01-15,블루투스 스피커,전자기기,22,120000,2640000,서울
2026-01-15,텀블러,생활용품,84,25000,2100000,서울
2026-01-19,보조배터리,전자기기,55,35000,1925000,대구
2026-01-19,에코백,생활용품,110,15000,1650000,서울
2026-01-19,무선 충전기,전자기기,33,45000,1485000,부산
2026-01-22,무선 이어폰,전자기기,61,89000,5429000,서울
2026-01-22,텀블러,생활용품,72,25000,1800000,대구
2026-01-22,블루투스 스피커,전자기기,15,120000,1800000,부산
2026-01-26,보조배터리,전자기기,48,35000,1680000,서울
2026-01-26,에코백,생활용품,88,15000,1320000,서울
2026-01-26,무선 충전기,전자기기,37,45000,1665000,대구
2026-02-01,무선 이어폰,전자기기,70,89000,6230000,서울
2026-02-01,텀블러,생활용품,95,25000,2375000,부산
2026-02-01,보조배터리,전자기기,43,35000,1505000,서울
2026-02-05,블루투스 스피커,전자기기,25,120000,3000000,서울
2026-02-05,에코백,생활용품,120,15000,1800000,대구
2026-02-05,무선 충전기,전자기기,31,45000,1395000,부산
2026-02-10,무선 이어폰,전자기기,58,89000,5162000,대구
2026-02-10,텀블러,생활용품,67,25000,1675000,서울
2026-02-10,보조배터리,전자기기,39,35000,1365000,서울`;

        // 숫자 포맷팅 (쉼표 추가)
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        // CSV 파싱
        function parseCSV(csv) {
            const lines = csv.trim().split('\n');
            const headers = lines[0].split(',');
            const data = [];
            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',');
                const obj = {};
                headers.forEach((header, index) => {
                    obj[header] = values[index];
                });
                data.push(obj);
            }
            return data;
        }

        const salesData = parseCSV(csvData);

        // 월별 매출 데이터 집계
        function getMonthlyData() {
            const monthlyMap = {};
            salesData.forEach(row => {
                const month = row['날짜'].substring(0, 7); // YYYY-MM
                const sales = parseInt(row['매출액']);
                if (!monthlyMap[month]) {
                    monthlyMap[month] = 0;
                }
                monthlyMap[month] += sales;
            });
            return Object.entries(monthlyMap).map(([month, sales]) => ({
                month,
                sales
            })).sort((a, b) => a.month.localeCompare(b.month));
        }

        // 제품별 매출 데이터 집계
        function getProductData() {
            const productMap = {};
            salesData.forEach(row => {
                const product = row['제품'];
                const sales = parseInt(row['매출액']);
                if (!productMap[product]) {
                    productMap[product] = 0;
                }
                productMap[product] += sales;
            });
            return Object.entries(productMap)
                .map(([product, sales]) => ({ product, sales }))
                .sort((a, b) => b.sales - a.sales);
        }

        const monthlyData = getMonthlyData();
        const productData = getProductData();

        // 색상 팔레트 (파란/초록 계열)
        const colors = {
            blueLight: '#3498db',
            blueMid: '#2980b9',
            blueDark: '#1e3a5f',
            greenLight: '#2ecc71',
            greenMid: '#27ae60',
            teal: '#1abc9c',
            cyan: '#16a085',
            skyBlue: '#87ceeb'
        };

        // 선 그래프 그리기
        function drawLineChart() {
            const canvas = document.getElementById('lineChart');
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;

            canvas.width = canvas.offsetWidth * dpr;
            canvas.height = canvas.offsetHeight * dpr;
            ctx.scale(dpr, dpr);

            const width = canvas.offsetWidth;
            const height = canvas.offsetHeight;
            const padding = { top: 30, right: 30, bottom: 40, left: 60 };
            const chartWidth = width - padding.left - padding.right;
            const chartHeight = height - padding.top - padding.bottom;

            // 배경 그리기
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, width, height);

            // 축 그리기
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(padding.left, padding.top);
            ctx.lineTo(padding.left, height - padding.bottom);
            ctx.lineTo(width - padding.right, height - padding.bottom);
            ctx.stroke();

            // Y축 라벨
            ctx.fillStyle = '#666';
            ctx.font = '12px Arial';
            ctx.textAlign = 'right';
            const maxSales = Math.max(...monthlyData.map(d => d.sales));
            for (let i = 0; i <= 5; i++) {
                const value = (maxSales / 5) * i;
                const y = height - padding.bottom - (chartHeight / 5) * i;
                ctx.fillText(formatNumber(Math.round(value)), padding.left - 10, y + 5);

                // 그리드 라인
                if (i > 0) {
                    ctx.strokeStyle = '#f0f0f0';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(padding.left, y);
                    ctx.lineTo(width - padding.right, y);
                    ctx.stroke();
                }
            }

            // 데이터 포인트 계산
            const points = monthlyData.map((data, index) => {
                const x = padding.left + (chartWidth / (monthlyData.length - 1 || 1)) * index;
                const y = height - padding.bottom - (data.sales / maxSales) * chartHeight;
                return { x, y, ...data };
            });

            // 선 그리기
            ctx.strokeStyle = colors.blueLight;
            ctx.lineWidth = 3;
            ctx.beginPath();
            points.forEach((point, index) => {
                if (index === 0) {
                    ctx.moveTo(point.x, point.y);
                } else {
                    ctx.lineTo(point.x, point.y);
                }
            });
            ctx.stroke();

            // 점 그리기
            ctx.fillStyle = colors.blueMid;
            points.forEach(point => {
                ctx.beginPath();
                ctx.arc(point.x, point.y, 5, 0, Math.PI * 2);
                ctx.fill();
            });

            // X축 라벨
            ctx.fillStyle = '#666';
            ctx.textAlign = 'center';
            points.forEach(point => {
                ctx.fillText(point.month, point.x, height - padding.bottom + 20);
            });
        }

        // 막대 그래프 그리기
        function drawBarChart() {
            const canvas = document.getElementById('barChart');
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;

            canvas.width = canvas.offsetWidth * dpr;
            canvas.height = canvas.offsetHeight * dpr;
            ctx.scale(dpr, dpr);

            const width = canvas.offsetWidth;
            const height = canvas.offsetHeight;
            const padding = { top: 30, right: 30, bottom: 80, left: 60 };
            const chartWidth = width - padding.left - padding.right;
            const chartHeight = height - padding.top - padding.bottom;

            // 배경 그리기
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, width, height);

            // 축 그리기
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(padding.left, padding.top);
            ctx.lineTo(padding.left, height - padding.bottom);
            ctx.lineTo(width - padding.right, height - padding.bottom);
            ctx.stroke();

            // Y축 라벨
            ctx.fillStyle = '#666';
            ctx.font = '12px Arial';
            ctx.textAlign = 'right';
            const maxSales = Math.max(...productData.map(d => d.sales));
            for (let i = 0; i <= 5; i++) {
                const value = (maxSales / 5) * i;
                const y = height - padding.bottom - (chartHeight / 5) * i;
                ctx.fillText(formatNumber(Math.round(value)), padding.left - 10, y + 5);

                // 그리드 라인
                if (i > 0) {
                    ctx.strokeStyle = '#f0f0f0';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(padding.left, y);
                    ctx.lineTo(width - padding.right, y);
                    ctx.stroke();
                }
            }

            // 막대 색상 배열
            const barColors = [colors.greenMid, colors.teal, colors.blueLight, colors.greenLight, colors.cyan, colors.blueMid];

            // 막대 그리기
            const barWidth = chartWidth / (productData.length * 1.5);
            productData.forEach((data, index) => {
                const x = padding.left + (chartWidth / productData.length) * index + (chartWidth / productData.length - barWidth) / 2;
                const barHeight = (data.sales / maxSales) * chartHeight;
                const y = height - padding.bottom - barHeight;

                ctx.fillStyle = barColors[index % barColors.length];
                ctx.fillRect(x, y, barWidth, barHeight);

                // 값 표시
                ctx.fillStyle = colors.blueDark;
                ctx.font = 'bold 11px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(formatNumber(Math.round(data.sales / 1000000 * 10) / 10) + '백만', x + barWidth / 2, y - 8);
            });

            // X축 라벨
            ctx.fillStyle = '#666';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            productData.forEach((data, index) => {
                const x = padding.left + (chartWidth / productData.length) * index + chartWidth / (productData.length * 2);
                ctx.save();
                ctx.translate(x, height - padding.bottom + 15);
                ctx.rotate(-Math.PI / 6);
                ctx.fillText(data.product, 0, 0);
                ctx.restore();
            });
        }

        // 통계 업데이트
        function updateStats() {
            const totalSales = salesData.reduce((sum, row) => sum + parseInt(row['매출액']), 0);
            const avgSales = Math.round(totalSales / monthlyData.length);
            const topProduct = productData[0].product;

            document.getElementById('totalSales').textContent = formatNumber(totalSales);
            document.getElementById('avgSales').textContent = formatNumber(avgSales);
            document.getElementById('topProduct').textContent = topProduct;
        }

        // 초기화
        function init() {
            drawLineChart();
            drawBarChart();
            updateStats();
        }

        // 창 크기 변경 시 리드로우
        window.addEventListener('resize', () => {
            drawLineChart();
            drawBarChart();
        });

        // 페이지 로드 시 실행
        window.addEventListener('load', init);
    </script>
</body>
</html>
